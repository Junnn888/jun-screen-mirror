# cbindgen configuration for the ScreenBridge C ABI.
# The header is generated by build.rs into <repo>/include/screenbridge.h.
language = "C"
pragma_once = true
include_guard = "SCREENBRIDGE_H"
cpp_compat = true
style = "type"
tab_width = 4
documentation = true
documentation_style = "c99"
header = """
/*
 * ScreenBridge — C ABI for the Rust core.
 *
 * GENERATED FILE — do not edit by hand. Regenerate with `cargo build` (the
 * screenbridge-ffi build script runs cbindgen). Source of truth: the public
 * `#[no_mangle] extern "C"` items in core/crates/ffi/src/lib.rs (PLAN.md §6.4).
 */"""
autogen_warning = "/* WARNING: this file is auto-generated by cbindgen; edits will be overwritten. */"

[parse]
# The ABI surface lives entirely in this crate; do not descend into deps.
parse_deps = false
